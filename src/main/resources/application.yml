spring:
  application:
    name: payment-ledger-kafka-integration

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-ledger-consumer
      auto-offset-reset: earliest
    listener:
      ack-mode: manual

app:
  kafka:
    topics:
      reconciled-payments: reconciled-payments

logging:
  level:
    root: INFO
    com.example.paymentledger: DEBUG
